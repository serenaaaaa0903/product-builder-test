<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 안전 보안관 - 다국어 지원 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #b59410;
            --bg: #f4f7f4;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        #lang-bar {
            background: #1b5e20;
            padding: 10px;
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .lang-btn.active {
            background: white;
            color: var(--primary);
            font-weight: bold;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        section { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #edu-section { display: none; }
        .edu-card { border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; position: relative; border-left: 8px solid #ccc; }
        .edu-card.done { border-left-color: var(--primary); background: #f1f8e9; }
        .edu-date { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .edu-btn { display: block; margin-top: 10px; padding: 12px; background: #444; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .done .edu-btn { background: var(--primary); }

        #link-display { display: none; margin-top: 20px; padding: 15px; background: #e8f5e9; border: 2px dashed var(--primary); border-radius: 12px; text-align: center; }

        #cert-wrapper { position: absolute; left: -9999px; top: -9999px; }
        #cert-template { width: 800px; padding: 60px; border: 20px double var(--accent); background: white; text-align: center; color: #212121; }
    </style>
</head>
<body>

<div id="lang-bar">
    <button id="btn-ko" class="lang-btn active" onclick="changeLang('ko')">한국어</button>
    <button id="btn-en" class="lang-btn" onclick="changeLang('en')">English</button>
    <button id="btn-zh" class="lang-btn" onclick="changeLang('zh')">中文</button>
    <button id="btn-ja" class="lang-btn" onclick="changeLang('ja')">日本語</button>
</div>

<header>
    <h1 id="txt-title">🛡️ 우리집 안전 보안관</h1>
    <p id="txt-subtitle">사랑하는 가족을 위한 맞춤 교육</p>
</header>

<div class="container">
    <section id="setup-section">
        <h2 id="txt-setup-h2">1. 교육 대상 설정</h2>
        <div class="form-group">
            <label id="txt-label-target">누구에게 보낼까요?</label>
            <select id="target_type">
                <option value="parent" id="txt-opt-parent">부모님께 (효도 보안관)</option>
                <option value="child" id="txt-opt-child">자녀에게 (청년 보안관)</option>
                <option value="spouse" id="txt-opt-spouse">배우자에게 (파트너 보안관)</option>
            </select>
        </div>
        <div class="form-group">
            <label id="txt-label-name">받는 분 성함</label>
            <input type="text" id="p_name" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label id="txt-label-msg">사랑의 메시지</label>
            <textarea id="p_msg" placeholder="사기 당하지 말고 행복하게 살자!"></textarea>
        </div>
        <button class="btn-main" id="txt-btn-generate" onclick="generateLink()">교육 링크 생성</button>

        <div id="link-display">
            <p id="txt-link-ready" style="font-weight:bold; color:var(--primary);">링크가 준비되었습니다!</p>
            <button class="btn-main" style="background:#fee500; color:#3c1e1e;" id="txt-btn-copy" onclick="copyUrl()">링크 복사 후 카톡 전송</button>
            <p id="final-url" style="font-size:0.75rem; color:#888; word-break:break-all; margin-top:10px;"></p>
        </div>
    </section>

    <section id="edu-section">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 id="txt-edu-welcome">보안관님 환영합니다!</h2>
            <p id="txt-edu-desc">가족이 준비한 5가지 교육을 완료해 주세요.</p>
            <div style="background:#eee; height:15px; border-radius:10px; overflow:hidden; margin:15px 0;">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--primary); transition:0.3s;"></div>
            </div>
            <p id="txt-progress">진행도: 0 / 5</p>
        </div>
        <div id="edu-list"></div>
        <button id="issue-btn" class="btn-main" style="display:none; background:var(--accent);" onclick="issueCert()">🏆 수료증 발급 (PDF)</button>
    </section>
</div>

<div id="cert-wrapper">
    <div id="cert-template">
        <div id="pdf-title" style="font-size: 3.5rem; color: #b59410; font-weight: bold; margin-bottom: 20px;">수 료 증</div>
        <div style="font-size: 2.2rem; font-weight: bold; margin-bottom: 30px;"><span id="pdf-label-name">성명</span>: <span id="pdf-val-name"></span></div>
        <div id="pdf-body" style="font-size: 1.5rem; line-height: 1.8; margin-bottom: 40px; word-break: keep-all; padding: 0 40px;">
            위 보안관님은 가족이 정성껏 준비한 사기 예방 교육을 모두 이수하였으므로 이 증서를 수여합니다.
        </div>
        <div style="background: #fdfae6; padding: 30px; border-radius: 20px; font-size: 1.4rem; color: #444; font-style: italic; border: 1px solid #eee; margin: 0 40px;">
            " <span id="pdf-val-msg"></span> "
        </div>
        <div style="margin-top: 50px; font-size: 1.2rem; color: #888;">
            <span id="pdf-date-label">발급일</span>: 2026. 03. 29<br><br>
            <b id="pdf-footer" style="font-size: 1.6rem; color: #333;">우리집 안전 보안관 본부</b>
        </div>
    </div>
</div>

    let currentLang = 'ko';

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${lang}`);
        if(activeBtn) activeBtn.classList.add('active');

        const d = langData[lang];
        document.getElementById('txt-title').innerText = d.title;
        document.getElementById('txt-subtitle').innerText = d.subtitle;
        document.getElementById('txt-setup-h2').innerText = d.setupH2;
        document.getElementById('txt-label-target').innerText = d.labelTarget;
        document.getElementById('txt-opt-parent').innerText = d.optParent;
        document.getElementById('txt-opt-child').innerText = d.optChild;
        document.getElementById('txt-opt-spouse').innerText = d.optSpouse;
        document.getElementById('txt-label-name').innerText = d.labelName;
        document.getElementById('p_name').placeholder = d.placeholderName;
        document.getElementById('txt-label-msg').innerText = d.labelMsg;
        document.getElementById('p_msg').placeholder = d.placeholderMsg;
        document.getElementById('txt-btn-generate').innerText = d.btnGenerate;
        document.getElementById('txt-link-ready').innerText = d.linkReady;
        document.getElementById('txt-btn-copy').innerText = d.btnCopy;
        document.getElementById('txt-edu-welcome').innerText = d.eduWelcome;
        document.getElementById('txt-edu-desc').innerText = d.eduDesc;
        document.getElementById('issue-btn').innerText = d.issueBtn;

        document.getElementById('pdf-title').innerText = d.certTitle;
        document.getElementById('pdf-body').innerText = d.certBody;
        document.getElementById('pdf-label-name').innerText = d.pdfName;
        document.getElementById('pdf-date-label').innerText = d.pdfDate;
        document.getElementById('pdf-footer').innerText = d.pdfFooter;

        if(document.getElementById('edu-section').style.display === 'block') {
            renderList();
        }
    }

    function generateLink() {
        const target = document.getElementById('target_type').value;
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(currentLang === 'ko' ? "내용을 모두 입력해주세요." : "Please fill in all fields.");

        const url = `${window.location.href.split('?')[0]}?lang=${currentLang}&target=${target}&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;
        document.getElementById('final-url').innerText = url;
        document.getElementById('link-display').style.display = 'block';
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('final-url').innerText);
        alert(langData[currentLang].alertLink);
    }

    function renderList() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';
        const d = langData[currentLang];
        d.eduList.forEach((item) => {
            const isDone = localStorage.getItem(`done_${item.id}`);
            const div = document.createElement('div');
            div.className = `edu-card ${isDone ? 'done' : ''}`;
            div.innerHTML = `
                <div class="edu-date">${item.date}</div>
                <span style="font-weight:bold;">${item.title}</span>
                <a href="${item.url}" target="_blank" class="edu-btn" onclick="done(${item.id})">${d.eduBtn}</a>
            `;
            list.appendChild(div);
        });
        updateStatus();
    }

    function done(id) {
        localStorage.setItem(`done_${id}`, 'true');
        setTimeout(renderList, 1000);
    }

    function updateStatus() {
        let count = 0;
        const d = langData[currentLang];
        d.eduList.forEach(i => { if(localStorage.getItem(`done_${i.id}`)) count++; });
        document.getElementById('progress-fill').style.width = (count/5*100) + '%';
        document.getElementById('txt-progress').innerText = `${d.progress}: ${count} / 5`;
        if(count >= 5) document.getElementById('issue-btn').style.display = 'block';
    }

    async function issueCert() {
        const params = new URLSearchParams(window.location.search);
        document.getElementById('pdf-val-name').innerText = params.get('name');
        document.getElementById('pdf-val-msg').innerText = params.get('msg');
        
        const template = document.getElementById('cert-template');
        const canvas = await html2canvas(template, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
        pdf.save(`${params.get('name')}_Certificate.pdf`);
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('name')) {
            const lang = params.get('lang') || 'ko';
            changeLang(lang);
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('edu-section').style.display = 'block';
            renderList();
        }
    };
</script>
</body>
</html>
