<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리집 안전 보안관 - 맞춤형 사기 예방 교육</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #b59410;
            --bg: #f0f2f0;
            --white: #ffffff;
            --text: #212121;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            line-height: 1.6;
            color: var(--text);
        }

        /* 헤더 디자인 - 모바일 가독성 최적화 */
        header {
            background-color: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        header h1 { font-size: 1.8rem; margin: 0; word-break: keep-all; }
        header p { font-size: 1rem; opacity: 0.9; margin: 10px 0 0; }

        .lang-selector {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .lang-selector select {
            padding: 5px;
            border-radius: 5px;
            border: none;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }
        .lang-selector select option { color: black; }

        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        /* [카드 공통 스타일] */
        .glass-card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* [섹션 1: 설정 화면] */
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 1rem; color: #444; }
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 1rem; 
            background: #fdfdfd;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        #link-display { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #e8f5e9; 
            border-radius: 15px; 
            border: 2px dashed var(--primary); 
            text-align: center; 
        }

        /* [섹션 2: 교육 화면] */
        #edu-section { display: none; }
        .progress-bar { height: 16px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        #progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.5s ease; }

        .edu-card { 
            background: white; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 15px; 
            border-left: 6px solid #ddd; 
            position: relative; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .edu-card.done { border-left-color: var(--primary); background-color: #f1f8e9; }
        
        .tag { font-size: 0.8rem; font-weight: bold; color: var(--primary); background: #e8f5e9; padding: 4px 10px; border-radius: 8px; margin-bottom: 8px; display: inline-block; }
        .card-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 15px; display: block; color: #333; word-break: keep-all; }
        
        .edu-btn { 
            display: block; 
            width: 100%; 
            padding: 14px; 
            background: #555; 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 12px; 
            font-weight: bold; 
        }
        .edu-card.done .edu-btn { background: var(--primary); }

        #issue-btn { 
            display: none; 
            width: 100%; 
            padding: 22px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(181, 148, 16, 0.3);
        }

        /* [PDF 수료증 템플릿 - 숨김 영역] */
        #cert-template {
            display: none; width: 700px; padding: 50px; border: 15px double var(--accent); background: white;
            text-align: center; position: fixed; left: -9999px; top: 0;
        }

        /* 모바일용 미디어 쿼리 */
        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .container { padding: 15px; }
            .card-title { font-size: 1.05rem; }
            .btn-main { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="lang-selector">
        <select id="lang-select" onchange="changeLang(this.value)">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
        </select>
    </div>
    <h1 id="header-title">🛡️ 우리집 안전 보안관</h1>
    <p id="header-sub">가족의 사랑이 담긴 예방 교육</p>
</header>

<div class="container">
    <section id="setup-section" class="glass-card">
        <h3 id="setup-title" style="margin-top:0;">1. 받는 분 맞춤 설정</h3>
        <div class="form-group">
            <label id="label-target">어떤 분에게 보낼까요?</label>
            <select id="target_type">
                <option value="parent" id="opt-parent">부모님 (효도 보안관)</option>
                <option value="child" id="opt-child">자녀 (청년 보안관)</option>
                <option value="spouse" id="opt-spouse">배우자 (수호 보안관)</option>
            </select>
        </div>
        <div class="form-group">
            <label id="label-name">받는 분 성함</label>
            <input type="text" id="p_name" placeholder="예: 김순자">
        </div>
        <div class="form-group">
            <label id="label-msg">마음을 전하는 한마디</label>
            <textarea id="p_msg" rows="3" placeholder="예: 엄마, 이거 보시고 사기 걱정 없이 행복하게 살자!"></textarea>
        </div>
        <button id="btn-generate" class="btn-main" onclick="generateEduLink()">교육 링크 만들기</button>

        <div id="link-display">
            <p id="link-ready-txt" style="font-weight:bold; color:var(--primary); margin-bottom:15px;">링크가 준비되었습니다!</p>
            <button id="btn-copy" class="btn-main" style="background:#fee500; color:#3c1e1e;" onclick="copyLink()">카톡 전송용 링크 복사</button>
            <p id="final-url" style="font-size:0.75rem; color:#999; word-break:break-all; margin-top:15px;"></p>
        </div>
    </section>

    <section id="edu-section">
        <div class="glass-card" style="text-align: center;">
            <h2 id="welcome-txt" style="margin:0; color:var(--primary); font-size: 1.5rem;">환영합니다!</h2>
            <p id="relation-txt" style="margin:10px 0; font-size: 0.95rem; color: #666;"></p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="status-txt" style="font-weight:bold; font-size: 0.9rem;">진행도: 0 / 5</div>
        </div>

        <div id="edu-list"></div>

        <button id="issue-btn" onclick="issueCertificate()">🏆 수료증 PDF 저장하기</button>
    </section>
</div>

<div id="cert-template">
    <div id="cert-title-pdf" style="font-size: 3.5rem; color: #b59410; font-weight: bold; margin-bottom: 20px;">수 료 증</div>
    <div style="font-size: 2.2rem; font-weight: bold; margin-bottom: 30px;"><span id="label-pdf-name">성명</span>: <span id="pdf-name"></span></div>
    <div id="cert-body" style="font-size: 1.4rem; line-height: 1.8; margin-bottom: 40px; word-break: keep-all; padding: 0 30px;">
        위 보안관님은 가족이 정성껏 준비한 '우리집 안전 교육' 과정을 성실히 이수하여 각종 사기 범죄로부터 가족의 행복을 지킬 지혜를 갖추었으므로 이 증서를 수여합니다.
    </div>
    <div style="background: #fdfae6; padding: 30px; border-radius: 15px; font-size: 1.3rem; color: #444; border: 1px solid #ddd; margin: 0 20px;">
        " <span id="pdf-msg"></span> "
    </div>
    <div style="margin-top: 50px; font-size: 1.2rem; color: #888;">
        <span id="label-pdf-date">발급일</span>: 2026년 3월 29일<br><br>
        <b id="pdf-footer" style="font-size: 1.8rem; color: #333;">우리집 안전 보안관 본부</b>
    </div>
</div>

            alertCopy: "リンクがコピーされました。",
            alertCertSuccess: "修了証が正常に発行されました！",
            alertCertError: "PDF作成中に問題が発生しました。",
            certTitle: "修 了 証",
            certLabelName: "氏名",
            certBody: "上記の保安官は、家族が丹精込めて準備した「我が家の安全教育」課程を誠実に履修し、各種詐欺犯罪から家族の幸せを守る知恵を身につけたため、本証を授与します。",
            certDate: "発行日",
            certFooter: "我が家の安全保安官本部",
            eduTags: ["ロマンス詐欺", "振り込め詐欺", "スミッシング", "政策詐欺", "AI犯罪"],
            eduTitles: [
                "「ロマンス詐欺」の実際の事例と対策",
                "検察・金融機関を騙る電話への対処法",
                "「画面が割れた」という家族を騙るメールへの対応",
                "政府支援金の案内メールは100％詐欺です",
                "声までそっくりなAIディープフェイク詐欺の見分け方"
            ],
            btnEduStart: "内容を確認",
            btnEduDone: "もう一度学ぶ"
        }
    };

    let currentLang = 'ko';

    const educationData = [
        { id: 1, url: "https://www.youtube.com/results?search_query=로맨스스캠+사례" },
        { id: 2, url: "https://v.daum.net/v/20260328153012" },
        { id: 3, url: "https://www.youtube.com/results?search_query=자녀사칭+스미싱" },
        { id: 4, url: "https://www.korea.kr/news/policyNewsView.do?newsId=148924373" },
        { id: 5, url: "https://v.daum.net/v/20260322000123" }
    ];

    function changeLang(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        updateUI();
    }

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('header-title').innerText = t.headerTitle;
        document.getElementById('header-sub').innerText = t.headerSub;
        document.getElementById('setup-title').innerText = t.setupTitle;
        document.getElementById('label-target').innerText = t.labelTarget;
        document.getElementById('opt-parent').innerText = t.optParent;
        document.getElementById('opt-child').innerText = t.optChild;
        document.getElementById('opt-spouse').innerText = t.optSpouse;
        document.getElementById('label-name').innerText = t.labelName;
        document.getElementById('p_name').placeholder = t.placeholderName;
        document.getElementById('label-msg').innerText = t.labelMsg;
        document.getElementById('p_msg').placeholder = t.placeholderMsg;
        document.getElementById('btn-generate').innerText = t.btnGenerate;
        document.getElementById('link-ready-txt').innerText = t.linkReady;
        document.getElementById('btn-copy').innerText = t.btnCopy;
        document.getElementById('btn-issue').innerText = t.btnIssue;
        document.getElementById('cert-title-pdf').innerText = t.certTitle;
        document.getElementById('label-pdf-name').innerText = t.certLabelName;
        document.getElementById('cert-body').innerText = t.certBody;
        document.getElementById('label-pdf-date').innerText = t.certDate;
        document.getElementById('pdf-footer').innerText = t.certFooter;

        const params = new URLSearchParams(window.location.search);
        if(params.get('name')) {
            document.getElementById('welcome-txt').innerText = `${params.get('name')} ${currentLang === 'ko' ? '보안관님!' : currentLang === 'ja' ? '保安官様！' : 'Sheriff!'}`;
            let relation = t.relationParent;
            const target = params.get('target');
            if(target === 'child') relation = t.relationChild;
            if(target === 'spouse') relation = t.relationSpouse;
            document.getElementById('relation-txt').innerText = relation;
            renderEduList();
        }
    }

    function generateEduLink() {
        const target = document.getElementById('target_type').value;
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(i18n[currentLang].alertInput);

        const baseUrl = window.location.href.split('?')[0];
        const params = new URLSearchParams({ target, name, msg, lang: currentLang });
        const finalUrl = `${baseUrl}?${params.toString()}`;

        document.getElementById('final-url').innerText = finalUrl;
        document.getElementById('link-display').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyLink() {
        const urlText = document.getElementById('final-url').innerText;
        if (navigator.share) {
            navigator.share({ title: i18n[currentLang].headerTitle, text: i18n[currentLang].headerSub, url: urlText });
        } else {
            navigator.clipboard.writeText(urlText).then(() => alert(i18n[currentLang].alertCopy));
        }
    }

    function init() {
        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'ko';
        document.getElementById('lang-select').value = lang;
        changeLang(lang);

        const name = params.get('name');
        const msg = params.get('msg');

        if(name && msg) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('edu-section').style.display = 'block';
            updateUI();
        }
    }

    function renderEduList() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';
        const t = i18n[currentLang];
        educationData.forEach((item, index) => {
            const isDone = localStorage.getItem(`edu_done_${item.id}`);
            const card = document.createElement('div');
            card.className = `edu-card ${isDone ? 'done' : ''}`;
            card.innerHTML = `
                <span class="tag">${t.eduTags[index]}</span>
                <span class="card-title">${t.eduTitles[index]}</span>
                <a href="${item.url}" target="_blank" class="edu-btn" onclick="completeStep(${item.id})">
                    ${isDone ? t.btnEduDone : t.btnEduStart}
                </a>
            `;
            list.appendChild(card);
        });
        updateStatus();
    }

    function completeStep(id) {
        localStorage.setItem(`edu_done_${id}`, 'true');
        setTimeout(() => renderEduList(), 1000);
    }

    function updateStatus() {
        let count = 0;
        educationData.forEach(item => { if(localStorage.getItem(`edu_done_${item.id}`)) count++; });
        const percent = (count / educationData.length) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('status-txt').innerText = `${i18n[currentLang].progressLabel}: ${count} / 5`;
        if(count >= 5) document.getElementById('issue-btn').style.display = 'block';
    }

    async function issueCertificate() {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const msg = params.get('msg');
        const t = i18n[currentLang];

        document.getElementById('pdf-name').innerText = name;
        document.getElementById('pdf-msg').innerText = msg;

        const template = document.getElementById('cert-template');
        template.style.display = 'block';

        try {
            const canvas = await html2canvas(template, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`${name}_Certificate.pdf`);
            alert(t.alertCertSuccess);
        } catch (e) {
            alert(t.alertCertError);
        } finally {
            template.style.display = 'none';
        }
    }

    window.onload = init;
</script>

</body>
</html>
